<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:#161e30;--border:#1f2d47;--accent:#00d4ff;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:1.5rem;min-height:100vh}
.katex{color:var(--text)!important;font-size:1em!important}
h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
.sub{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.3rem}
.badge{display:inline-block;padding:.16rem .5rem;border-radius:20px;font-size:.67rem;font-weight:700;margin-bottom:.6rem;font-family:monospace}
.basico{background:rgba(16,185,129,.2);color:var(--green)}
.inter{background:rgba(245,158,11,.2);color:var(--yellow)}
.avancado{background:rgba(239,68,68,.2);color:var(--red)}
.eq{font-size:.9rem;line-height:1.7;margin-bottom:.8rem}
.ta{width:100%;min-height:52px;background:#111827;border:1px solid var(--border);border-radius:7px;padding:.6rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;resize:vertical}
.ta:focus{border-color:var(--accent);outline:none}
.rbtn{margin-top:.6rem;padding:.42rem .85rem;border-radius:6px;font-size:.78rem;background:#111827;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.ans{margin-top:.6rem;padding:.7rem .9rem;border-radius:8px;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.25);line-height:1.9;font-size:.87rem;display:none}
.ans.show{display:block}
</style>
</head>
<body>
<h1>Exercícios</h1>
<p class="sub">10 problemas em 3 níveis — resolva antes de ver o gabarito</p>
<div class="grid" id="grid"></div>

<script>
const EX=[
  {n:'basico',q:'Dados $A(2,1)$ e $B(5,4)$, determine as componentes do vetor $\\overrightarrow{AB}$.',a:'\\overrightarrow{AB}=B-A=(5-2,\\;4-1)=(3,3)'},
  {n:'basico',q:'Calcule o módulo de $\\vec{v}=(-3,4)$.',a:'|\\vec{v}|=\\sqrt{(-3)^2+4^2}=\\sqrt{9+16}=\\sqrt{25}=5'},
  {n:'basico',q:'Dados $\\vec{u}=(1,-2)$ e $\\vec{v}=(3,5)$, calcule $2\\vec{u}+\\vec{v}$.',a:'2\\vec{u}=(2,-4).\\quad 2\\vec{u}+\\vec{v}=(2+3,\\;-4+5)=(5,1)'},
  {n:'basico',q:'Determine o versor de $\\vec{v}=(5,0)$.',a:'|\\vec{v}|=5.\\quad \\hat{v}=\\dfrac{\\vec{v}}{5}=\\left(\\tfrac{5}{5},\\tfrac{0}{5}\\right)=(1,0)=\\vec{\\imath}'},
  {n:'inter',q:'Verifique se $\\vec{u}=(2,-4)$ e $\\vec{v}=(-3,6)$ são paralelos e determine o sentido.',a:'\\dfrac{2}{-3}=-\\dfrac{2}{3}\\text{ e }\\dfrac{-4}{6}=-\\dfrac{2}{3}.\\text{ Proporção negativa: paralelos com sentidos contrários.}'},
  {n:'inter',q:'Dados $A(-1,2)$, $B(3,-1)$ e $C(2,4)$, determine $D$ tal que $\\overrightarrow{CD}=\\tfrac{1}{2}\\overrightarrow{AB}$.',a:'\\overrightarrow{AB}=(4,-3),\\quad\\tfrac{1}{2}\\overrightarrow{AB}=\\left(2,-\\tfrac{3}{2}\\right).\\quad D=\\left(4,\\;\\tfrac{5}{2}\\right)'},
  {n:'inter',q:'Encontre $\\alpha\\in\\mathbb{R}$ tal que $|\\alpha\\vec{v}|=10$, sendo $\\vec{v}=(3,4)$.',a:'|\\vec{v}|=5.\\quad |\\alpha|\\cdot 5=10\\Rightarrow|\\alpha|=2\\Rightarrow\\alpha=2\\text{ ou }\\alpha=-2'},
  {n:'avancado',q:'No paralelogramo $ABCD$, $A(1,0)$, $B(4,1)$ e $C(5,3)$. Determine $D$.',a:'\\overrightarrow{AB}=(3,1).\\quad D=C-\\overrightarrow{AB}=(5-3,\\;3-1)=(2,2)'},
  {n:'avancado',q:'Dados $\\vec{u}=(2,3,-1)$ e $\\vec{v}=(-1,0,2)$ em $\\mathbb{R}^3$, calcule $|\\vec{u}-2\\vec{v}|$.',a:'2\\vec{v}=(-2,0,4).\\quad\\vec{u}-2\\vec{v}=(4,3,-5).\\quad|\\vec{u}-2\\vec{v}|=\\sqrt{50}=5\\sqrt{2}'},
  {n:'avancado',q:'Mostre que $P(1,-1,2)$, $Q(3,2,0)$ e $R(-1,-4,4)$ são colineares.',a:'\\overrightarrow{PQ}=(2,3,-2).\\quad\\overrightarrow{PR}=(-2,-3,2)=-\\overrightarrow{PQ}.\\text{ Proporcionais }\\Rightarrow\\text{colineares.}'},
];

function rTeX(el,text){
  function go(){
    if(!window.katex){setTimeout(go,80);return;}
    const parts=text.split(/\$([^$]+)\$/g);
    el.innerHTML='';
    parts.forEach((p,i)=>{
      if(i%2===0){el.appendChild(document.createTextNode(p));}
      else{const s=document.createElement('span');try{katex.render(p,s,{throwOnError:false});}catch(e){s.textContent=p;}el.appendChild(s);}
    });
  }go();
}

function K(el,tex,d){
  function r(){if(window.katex){katex.render(tex,el,{throwOnError:false,displayMode:!!d});}else setTimeout(r,80);}r();
}

window.addEventListener('load',()=>{
  const grid=document.getElementById('grid');
  EX.forEach((ex,i)=>{
    const lbl=ex.n==='basico'?'BÁSICO':ex.n==='inter'?'INTERMEDIÁRIO':'AVANÇADO';
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div class="badge ${ex.n}">${lbl}</div>
<div class="eq" id="q${i}"></div>
<textarea class="ta" placeholder="Escreva sua resolução..."></textarea>
<button class="rbtn" onclick="tog(${i})">▼ Ver gabarito</button>
<div class="ans" id="a${i}"></div>`;
    grid.appendChild(d);
    setTimeout(()=>{
      rTeX(document.getElementById('q'+i),(i+1)+'. '+ex.q);
      K(document.getElementById('a'+i),ex.a);
    },300);
  });
});

function tog(i){
  const a=document.getElementById('a'+i),b=a.previousElementSibling;
  if(a.classList.contains('show')){a.classList.remove('show');b.textContent='▼ Ver gabarito';}
  else{a.classList.add('show');b.textContent='▲ Ocultar gabarito';}
}
</script>
</body>
</html>
